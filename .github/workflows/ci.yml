name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.14"
      # S4 はローカル修正版が前提なので CI には入れない（solver グループを除外）。
      # S4 依存のテストは importorskip で自動スキップされる。
      - name: Install dependencies (without S4)
        run: uv sync --no-default-groups --group dev
      - name: Lint
        run: uv run ruff check .
      - name: Type check
        run: uv run pyright
      - name: Test
        run: uv run pytest -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build
